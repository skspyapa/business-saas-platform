spring:
  application:
    name: business-saas-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/business_saas
    username: postgres
    password: postgresql
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
    out-of-order: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG