spring:
  application:
    name: business-saas-platform
  security:
    oauth2:
      resourceserver:
        jwt:
          # IMPORTANT: Change this URL/port to match your local Keycloak instance and Realm name!
          issuer-uri: http://localhost:8080/realms/business-saas

  datasource:
    url: jdbc:postgresql://localhost:5432/business_saas
    username: postgres
    password: postgresql
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
    out-of-order: true

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: DEBUG